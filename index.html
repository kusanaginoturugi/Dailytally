<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>毎日集計</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>毎日集計</h1>
      <p>9つの伝道会が毎日入力し、次ページで全体合計を確認できます。</p>
    </header>

    <main>
      <section class="settings" aria-label="表示設定">
        <label>
          週の開始日
          <input id="weekStart" type="date" />
        </label>
        <label>
          項目数
          <select id="itemCount">
            <option value="7">7項目</option>
            <option value="8">8項目</option>
            <option value="9" selected>9項目</option>
          </select>
        </label>
        <label>
          得道者数開始日
          <input id="seekerStart" type="date" />
        </label>
      </section>

      <section class="tabs" aria-label="伝道会ページ切り替え">
        <div id="tabButtons" class="tab-buttons"></div>
      </section>

      <section id="pageContainer" class="page-container"></section>
    </main>

    <template id="inputPageTemplate">
      <section class="input-page">
        <h2 class="page-title"></h2>
        <p class="page-description">入力数値はこの端末に自動保存されます。</p>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr id="inputHeaderRow"></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>
    </template>

    <template id="summaryPageTemplate">
      <section class="summary-page">
        <div class="table-wrap">
          <table class="data-table summary-table" id="summaryTable">
            <thead>
              <tr class="summary-table-title-row">
                <th data-summary-colspan colspan="10">～第30回八大明王護摩供　集計表～　報告数は累計数です</th>
              </tr>
              <tr class="summary-meta-row">
                <th colspan="3">聖院名: 聖明王院</th>
                <th colspan="3">ご担当者名: 尾ノ上裕美</th>
                <th data-phone-colspan colspan="4">電話番号: 09041779036</th>
              </tr>
              <tr id="summaryHeaderRow"></tr>
            </thead>
            <tbody></tbody>
            <tfoot>
              <tr id="weeklyTotalRow"></tr>
            </tfoot>
          </table>
        </div>
        <p class="summary-note">※水は種類を問わず、ケース数で記入(1ケース20リットルとして計算願います)</p>
      </section>
    </template>

    <script src="app.js"></script>
  </body>
</html>
